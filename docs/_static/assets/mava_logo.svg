<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">

  <!-- White background -->
  <rect width="160" height="160" fill="white"/>

  <!-- Video frame / screen -->
  <rect x="16" y="16" width="128" height="88" rx="8"
        fill="none" stroke="#6b7fe0" stroke-width="5"/>

  <!-- Play triangle inside frame -->
  <polygon points="58,36 58,88 110,62" fill="#6b7fe0"/>

  <!-- Track lanes below the frame -->

  <!-- Lane 1 — dense (ObservationSeries) -->
  <rect x="16" y="112" width="128" height="13" rx="3" fill="#e8eaf8"/>
  <rect x="16"  y="112" width="20" height="13" rx="3" fill="#6b7fe0" opacity="0.9"/>
  <rect x="40"  y="112" width="14" height="13" rx="3" fill="#6b7fe0" opacity="0.9"/>
  <rect x="58"  y="112" width="24" height="13" rx="3" fill="#6b7fe0" opacity="0.9"/>
  <rect x="86"  y="112" width="10" height="13" rx="3" fill="#6b7fe0" opacity="0.9"/>
  <rect x="100" y="112" width="18" height="13" rx="3" fill="#6b7fe0" opacity="0.9"/>
  <rect x="122" y="112" width="22" height="13" rx="3" fill="#6b7fe0" opacity="0.9"/>

  <!-- Lane 2 — sparse (AnnotationSeries) -->
  <rect x="16" y="130" width="128" height="13" rx="3" fill="#e8eaf8"/>
  <rect x="16"  y="130" width="50" height="13" rx="3" fill="#6b7fe0" opacity="0.5"/>
  <rect x="74"  y="130" width="70" height="13" rx="3" fill="#6b7fe0" opacity="0.5"/>

</svg>
