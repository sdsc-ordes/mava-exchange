<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">

  <!-- White background -->
  <rect width="400" height="120" fill="white"/>

  <!-- ── Icon: video frame with track lanes below ── -->

  <!-- Video frame / screen -->
  <rect x="12" y="12" width="72" height="52" rx="5"
        fill="none" stroke="#6b7fe0" stroke-width="3"/>

  <!-- Play triangle inside frame -->
  <polygon points="36,24 36,52 62,38" fill="#6b7fe0"/>

  <!-- Track lanes below the frame (annotation tracks) -->
  <!-- Lane 1 — ObservationSeries (dense, many small blocks) -->
  <rect x="12" y="72" width="72" height="9" rx="2" fill="#e8eaf8"/>
  <rect x="12" y="72" width="12" height="9" rx="2" fill="#6b7fe0" opacity="0.9"/>
  <rect x="26" y="72" width="8"  height="9" rx="2" fill="#6b7fe0" opacity="0.9"/>
  <rect x="36" y="72" width="14" height="9" rx="2" fill="#6b7fe0" opacity="0.9"/>
  <rect x="52" y="72" width="6"  height="9" rx="2" fill="#6b7fe0" opacity="0.9"/>
  <rect x="60" y="72" width="10" height="9" rx="2" fill="#6b7fe0" opacity="0.9"/>
  <rect x="72" y="72" width="12" height="9" rx="2" fill="#6b7fe0" opacity="0.9"/>

  <!-- Lane 2 — AnnotationSeries (sparse, wider blocks) -->
  <rect x="12" y="85" width="72" height="9" rx="2" fill="#e8eaf8"/>
  <rect x="12" y="85" width="28" height="9" rx="2" fill="#6b7fe0" opacity="0.5"/>
  <rect x="44" y="85" width="40" height="9" rx="2" fill="#6b7fe0" opacity="0.5"/>

  <!-- Lane 3 — another track -->
  <rect x="12" y="98" width="72" height="9" rx="2" fill="#e8eaf8"/>
  <rect x="20" y="98" width="18" height="9" rx="2" fill="#6b7fe0" opacity="0.35"/>
  <rect x="50" y="98" width="22" height="9" rx="2" fill="#6b7fe0" opacity="0.35"/>

  <!-- ── Wordmark ── -->

  <text x="102" y="66"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="52"
        font-weight="700"
        fill="#4a4a4a">mava</text>

  <text x="104" y="94"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22"
        font-weight="400"
        letter-spacing="3"
        fill="#6b7fe0">exchange</text>

</svg>
