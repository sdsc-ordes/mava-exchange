<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaPkg Viewer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        padding: 30px;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
      }

      #dropZone {
        border: 2px dashed #ccc;
        border-radius: 8px;
        padding: 60px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: #fafafa;
      }

      #dropZone:hover {
        border-color: #4caf50;
        background: #f0f8f0;
      }

      #dropZone.dragover {
        border-color: #4caf50;
        background: #e8f5e9;
      }

      .drop-icon {
        font-size: 48px;
        margin-bottom: 20px;
      }

      #fileInput {
        display: none;
      }

      #packageInfo {
        margin: 30px 0;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 6px;
        display: none;
      }

      #packageInfo.visible {
        display: block;
      }

      .info-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        margin-top: 10px;
      }

      .info-label {
        font-weight: 600;
        color: #555;
      }

      .info-value {
        color: #333;
      }

      #videoList {
        margin: 20px 0;
      }

      .video-card {
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 15px;
        margin-bottom: 15px;
        background: white;
      }

      .video-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .video-icon {
        font-size: 24px;
      }

      .video-title {
        font-size: 18px;
        font-weight: 600;
        color: #333;
      }

      .track-list {
        margin-left: 34px;
      }

      .track-item {
        padding: 8px 12px;
        margin: 5px 0;
        background: #f5f5f5;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .track-item:hover {
        background: #e3f2fd;
        transform: translateX(5px);
      }

      .track-type {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 3px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .track-type.observation {
        background: #e3f2fd;
        color: #1976d2;
      }

      .track-type.annotation {
        background: #fff3e0;
        color: #f57c00;
      }

      .track-type.list {
        background: #f3e5f5;
        color: #7b1fa2;
      }

      #visualization {
        margin-top: 30px;
        display: none;
      }

      #visualization.visible {
        display: block;
      }

      .viz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #e0e0e0;
      }

      .viz-title {
        font-size: 20px;
        font-weight: 600;
      }

      .close-btn {
        background: #f44336;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }

      .close-btn:hover {
        background: #d32f2f;
      }

      #chart {
        margin-top: 20px;
        min-height: 200px;
      }

      .error {
        background: #ffebee;
        color: #c62828;
        padding: 15px;
        border-radius: 6px;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>MediaPkg Viewer</h1>
      <p class="subtitle">
        Load and explore .mediapkg video annotation packages
      </p>

      <div id="dropZone">
        <div class="drop-icon">📦</div>
        <h3>Drop a .mediapkg file here</h3>
        <p style="margin-top: 10px; color: #666">or click to browse</p>
        <input type="file" id="fileInput" accept=".mediapkg" />
      </div>

      <div id="packageInfo">
        <h2>Package Information</h2>
        <div class="info-grid">
          <span class="info-label">Version:</span>
          <span class="info-value" id="infoVersion">—</span>

          <span class="info-label">Created:</span>
          <span class="info-value" id="infoCreated">—</span>

          <span class="info-label">Description:</span>
          <span class="info-value" id="infoDescription">—</span>

          <span class="info-label">Videos:</span>
          <span class="info-value" id="infoVideos">—</span>

          <span class="info-label">Tracks:</span>
          <span class="info-value" id="infoTracks">—</span>
        </div>
      </div>

      <div id="videoList"></div>

      <div id="visualization">
        <div class="viz-header">
          <div>
            <div class="viz-title" id="vizTitle"></div>
            <div style="color: #666; margin-top: 5px" id="vizSubtitle"></div>
          </div>
          <button class="close-btn" onclick="closeVisualization()">
            Close
          </button>
        </div>
        <div id="chart"></div>
      </div>
    </div>

    <!-- JSZip library -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <!-- Our viewer script (inline for compatibility) -->
    <script>
      // MediaPkg Viewer - Inline version for better compatibility
      let currentPackage = null

      console.log("Viewer script loaded")

      // Wait for DOM to be ready
      document.addEventListener("DOMContentLoaded", function () {
        console.log("DOM ready, setting up event listeners")

        const dropZone = document.getElementById("dropZone")
        const fileInput = document.getElementById("fileInput")

        if (!dropZone || !fileInput) {
          console.error("Elements not found!")
          return
        }

        console.log("Elements found:", { dropZone, fileInput })

        // Click to browse
        dropZone.addEventListener("click", function () {
          console.log("Drop zone clicked")
          fileInput.click()
        })

        // Drag & drop
        dropZone.addEventListener("dragover", function (e) {
          e.preventDefault()
          e.stopPropagation()
          dropZone.classList.add("dragover")
        })

        dropZone.addEventListener("dragleave", function (e) {
          e.preventDefault()
          e.stopPropagation()
          dropZone.classList.remove("dragover")
        })

        dropZone.addEventListener("drop", function (e) {
          e.preventDefault()
          e.stopPropagation()
          dropZone.classList.remove("dragover")
          console.log("File dropped")
          const file = e.dataTransfer.files[0]
          if (file) {
            console.log("Processing file:", file.name)
            loadPackage(file)
          }
        })

        // File input change
        fileInput.addEventListener("change", function (e) {
          console.log("File selected via input")
          const file = e.target.files[0]
          if (file) {
            console.log("Processing file:", file.name)
            loadPackage(file)
          }
        })

        console.log("All event listeners attached")
      })

      // Load and parse .mediapkg file
      async function loadPackage(file) {
        try {
          console.log("Loading package:", file.name)

          // Read ZIP file
          const arrayBuffer = await file.arrayBuffer()
          console.log("File loaded, size:", arrayBuffer.byteLength)

          const zip = await JSZip.loadAsync(arrayBuffer)
          console.log("ZIP loaded, files:", Object.keys(zip.files))

          // Read manifest
          const manifestFile = zip.file("manifest.json")
          if (!manifestFile) {
            throw new Error("manifest.json not found in package")
          }
          const manifestText = await manifestFile.async("text")
          const manifest = JSON.parse(manifestText)
          console.log("Manifest loaded:", manifest)

          // Store package data
          currentPackage = { manifest, zip, name: file.name }

          // Display package info
          displayPackageInfo(manifest)
          displayVideoList(manifest, zip)
        } catch (error) {
          showError("Failed to load package: " + error.message)
          console.error("Load error:", error)
        }
      }

      function displayPackageInfo(manifest) {
        document.getElementById("infoVersion").textContent = manifest.version
        document.getElementById("infoCreated").textContent =
          manifest.created || "—"
        document.getElementById("infoDescription").textContent =
          manifest.description || "—"
        document.getElementById("infoVideos").textContent =
          manifest.videos.length
        document.getElementById("infoTracks").textContent = Object.keys(
          manifest.tracks,
        ).length

        document.getElementById("packageInfo").classList.add("visible")
      }

      function displayVideoList(manifest) {
        const videoList = document.getElementById("videoList")
        videoList.innerHTML = "<h2>Videos & Tracks</h2>"

        for (const video of manifest.videos) {
          const videoCard = document.createElement("div")
          videoCard.className = "video-card"

          const header = document.createElement("div")
          header.className = "video-header"
          header.innerHTML =
            '<span class="video-icon">📹</span><span class="video-title">' +
            video.id +
            "</span>"
          videoCard.appendChild(header)

          const trackList = document.createElement("div")
          trackList.className = "track-list"

          for (const [trackName, trackPath] of Object.entries(video.files)) {
            const trackDef = manifest.tracks[trackName]
            const trackItem = document.createElement("div")
            trackItem.className = "track-item"

            const typeClass =
              trackDef.type === "mava:ObservationSeries"
                ? "observation"
                : trackDef.type === "mava:AnnotationListSeries"
                  ? "list"
                  : "annotation"

            const icon =
              trackDef.type === "mava:ObservationSeries"
                ? "📊"
                : trackDef.type === "mava:AnnotationListSeries"
                  ? "🏷️"
                  : "📝"

            trackItem.innerHTML =
              "<span>" +
              icon +
              '</span><span style="flex: 1;">' +
              trackName +
              '</span><span class="track-type ' +
              typeClass +
              '">' +
              trackDef.type.split(":")[1] +
              "</span>"

            trackItem.onclick = function () {
              visualizeTrack(video.id, trackName, trackPath, trackDef)
            }
            trackList.appendChild(trackItem)
          }

          videoCard.appendChild(trackList)
          videoList.appendChild(videoCard)
        }
      }

      function visualizeTrack(videoId, trackName, trackPath, trackDef) {
        console.log("Visualizing track:", trackName)

        document.getElementById("vizTitle").textContent = trackName
        document.getElementById("vizSubtitle").textContent =
          trackDef.type.split(":")[1] + " • " + videoId
        document.getElementById("visualization").classList.add("visible")
        document
          .getElementById("visualization")
          .scrollIntoView({ behavior: "smooth" })

        const chart = document.getElementById("chart")
        chart.innerHTML =
          '<div style="padding: 40px; text-align: center; background: #f5f5f5; border-radius: 8px;">' +
          "<h3>Track: " +
          trackName +
          "</h3>" +
          '<p style="margin-top: 10px; color: #666;">Type: ' +
          trackDef.type +
          "</p>" +
          '<p style="margin-top: 5px; color: #666;">Description: ' +
          trackDef.description +
          "</p>" +
          '<p style="margin-top: 20px; font-size: 14px;"><strong>Note:</strong> Parquet visualization coming soon.<br>' +
          "For now, this confirms the package loads correctly.</p></div>"
      }

      function closeVisualization() {
        document.getElementById("visualization").classList.remove("visible")
      }

      function showError(message) {
        console.error("Error:", message)
        const errorDiv = document.createElement("div")
        errorDiv.className = "error"
        errorDiv.textContent = message
        document
          .querySelector(".container")
          .insertBefore(
            errorDiv,
            document.getElementById("dropZone").nextSibling,
          )
        setTimeout(function () {
          errorDiv.remove()
        }, 5000)
      }

      window.closeVisualization = closeVisualization

      console.log("Functions defined, waiting for DOM...")
    </script>
  </body>
</html>
