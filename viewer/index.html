<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaPkg Viewer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        padding: 30px;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
      }

      #dropZone {
        border: 2px dashed #ccc;
        border-radius: 8px;
        padding: 60px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: #fafafa;
      }

      #dropZone:hover {
        border-color: #4caf50;
        background: #f0f8f0;
      }

      #dropZone.dragover {
        border-color: #4caf50;
        background: #e8f5e9;
      }

      .drop-icon {
        font-size: 48px;
        margin-bottom: 20px;
      }

      #fileInput {
        display: none;
      }

      #packageInfo {
        margin: 30px 0;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 6px;
        display: none;
      }

      #packageInfo.visible {
        display: block;
      }

      .info-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        margin-top: 10px;
      }

      .info-label {
        font-weight: 600;
        color: #555;
      }

      .info-value {
        color: #333;
      }

      #videoList {
        margin: 20px 0;
      }

      .video-card {
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 15px;
        margin-bottom: 15px;
        background: white;
      }

      .video-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .video-icon {
        font-size: 24px;
      }

      .video-title {
        font-size: 18px;
        font-weight: 600;
        color: #333;
      }

      .track-list {
        margin-left: 34px;
      }

      .track-item {
        padding: 8px 12px;
        margin: 5px 0;
        background: #f5f5f5;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .track-item:hover {
        background: #e3f2fd;
        transform: translateX(5px);
      }

      .track-type {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 3px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .track-type.observation {
        background: #e3f2fd;
        color: #1976d2;
      }

      .track-type.annotation {
        background: #fff3e0;
        color: #f57c00;
      }

      .track-type.list {
        background: #f3e5f5;
        color: #7b1fa2;
      }

      #visualization {
        margin-top: 30px;
        display: none;
      }

      #visualization.visible {
        display: block;
      }

      .viz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #e0e0e0;
      }

      .viz-title {
        font-size: 20px;
        font-weight: 600;
      }

      .close-btn {
        background: #f44336;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }

      .close-btn:hover {
        background: #d32f2f;
      }

      #chart {
        margin-top: 20px;
        min-height: 200px;
      }

      .error {
        background: #ffebee;
        color: #c62828;
        padding: 15px;
        border-radius: 6px;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>MediaPkg Viewer</h1>
      <p class="subtitle">
        Load and explore .mediapkg video annotation packages
      </p>

      <div id="dropZone">
        <div class="drop-icon">📦</div>
        <h3>Drop a .mediapkg file here</h3>
        <p style="margin-top: 10px; color: #666">or click to browse</p>
        <input type="file" id="fileInput" accept=".mediapkg" />
      </div>

      <div id="packageInfo">
        <h2>Package Information</h2>
        <div class="info-grid">
          <span class="info-label">Version:</span>
          <span class="info-value" id="infoVersion">—</span>

          <span class="info-label">Created:</span>
          <span class="info-value" id="infoCreated">—</span>

          <span class="info-label">Description:</span>
          <span class="info-value" id="infoDescription">—</span>

          <span class="info-label">Videos:</span>
          <span class="info-value" id="infoVideos">—</span>

          <span class="info-label">Tracks:</span>
          <span class="info-value" id="infoTracks">—</span>
        </div>
      </div>

      <div id="videoList"></div>

      <div id="visualization">
        <div class="viz-header">
          <div>
            <div class="viz-title" id="vizTitle"></div>
            <div style="color: #666; margin-top: 5px" id="vizSubtitle"></div>
          </div>
          <button class="close-btn" onclick="closeVisualization()">
            Close
          </button>
        </div>
        <div id="chart"></div>
      </div>
    </div>

    <!-- JSZip library -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <!-- hyparquet - pure JS Parquet reader -->
    <script type="module" src="viewer.js"></script>
  </body>
</html>
